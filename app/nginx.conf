server {
    listen 80;
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:30081;
        add_header X-Nginx-Host $hostname always;
        add_header X-Upstream-Addr $upstream_addr always;
        add_header X-Upstream-Status $upstream_status always;
    }
}
