apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-deployer
  namespace: demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-deployer-role
  namespace: demo
rules:
- apiGroups: ["", "apps"]
  resources:
    - pods
    - services
    - deployments
    - replicasets
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-deployer-binding
  namespace: demo
subjects:
- kind: ServiceAccount
  name: jenkins-deployer
  namespace: demo
roleRef:
  kind: Role
  name: jenkins-deployer-role
  apiGroup: rbac.authorization.k8s.io